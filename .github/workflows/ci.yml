name: CI — Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Frontend Build ────────────────────────────────────────
  client:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SIMMAM-Laser-Hack/client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SIMMAM-Laser-Hack/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app

  # ─── Backend Build ─────────────────────────────────────────
  server:
    name: Backend Build (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SIMMAM-Laser-Hack/server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SIMMAM-Laser-Hack/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compile
        run: npm run build
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          JWT_SECRET: placeholder
